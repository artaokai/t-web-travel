<svg
  width="100"
  height="100"
  viewBox="0 0 100 100"
  xmlns="http://www.w3.org/2000/svg"
  fill="#000000"
>
  <circle
    cx="50"
    cy="50"
    r="40"
    stroke="#000000"
    strokeWidth="4"
    fill="none"
    strokeDasharray="80 200"
  >
    <animateTransform
      attributeName="transform"
      attributeType="xml"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="0.6s"
      repeatCount="indefinite"
    />
  </circle>
</svg>;
