<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <title>Login Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Form Login For Yanz-APis">
    <meta name="author" content="ImYanz">
    <link href="assets/css/vendor.min.css" rel="stylesheet">
    <link href="assets/css/app.min.css" rel="stylesheet">
</head>

<body class="pace-top">
    <div id="app" class="app app-full-height app-without-header">
        <div class="login">
            <div class="login-content">
                <h1 class="text-center"><b>Welcome To</b>
                </h1>
                <div class="text-inverse text-opacity-50 text-center mb-4">Yanz-APis</div>
                <br>
                <div class="card">
                    <div class="card-header fw-bold small text-center">Login</div>
                    <div class="card-body">
                        <div id="content" class="content">
                            <form id="form">
                                <div class="mb-3">
                                    <label class="form-label">Username or email address<span
                                            class="text-danger">*</span>
                                    </label>
                                    <input type="text" name="text" id="text"
                                        class="form-control form-control-lg bg-inverse bg-opacity-5 mb-3" value=""
                                        placeholder="">
                                    <div id="emailError" class="text-danger d-none">Email or Username is required.</div>
                                    <label class="form-label">Password<span class="text-danger">*</span>
                                    </label>
                                    <input type="password" name="password" id="password"
                                        class="form-control form-control-lg bg-inverse bg-opacity-5" value=""
                                        placeholder="">
                                    <div id="passwordError" class="text-danger d-none">Password is required.</div>
                                </div>
                                <button type="submit" value="login"
                                    class="btn btn-outline-theme btn-lg d-block w-100 fw-500 mb-3" id="one">Login</button>
                                <div class="text-center text-inverse text-opacity-50">Want to create an account? <a
                                        href="">Register</a>.
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="card-arrow">
                        <div class="card-arrow-top-left"></div>
                        <div class="card-arrow-top-right"></div>
                        <div class="card-arrow-bottom-left"></div>
                        <div class="card-arrow-bottom-right"></div>
                    </div>
                </div>
                <br>
            </div>
        </div>
        <a href="#" data-toggle="scroll-to-top" class="btn-scroll-top fade">
            <i class="fa fa-arrow-up"></i>
        </a>
    </div>
    <script>
        var users = [
            { username: "user1", password: "password1" },
            { username: "user2", password: "password2" },
            { username: "user3", password: "password3" },
            { username: "user4", password: "password4" },
            { username: "user5", password: "password5" },
            { username: "user6", password: "password6" },
            { username: "user7", password: "password7" },
            { username: "user8", password: "password8" },
            { username: "user9", password: "password9" },
            { username: "user10", password: "password10" },
            { username: "user11", password: "password11" },
        ];

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelector("form").addEventListener("submit", function (e) {
                e.preventDefault();

                var username = document.querySelector('#text').value;
                var password = document.querySelector('#password').value;

                if (username.trim() === "") {
                    document.getElementById("emailError").classList.remove("d-none");
                } else {
                    document.getElementById("emailError").classList.add("d-none");
                }

                if (password.trim() === "") {
                    document.getElementById("passwordError").classList.remove("d-none");
                } else {
                    document.getElementById("passwordError").classList.add("d-none");
                }

                if (username.trim() === "" || password.trim() === "") {
                    return;
                }

                var isValidUser = false;
                for (var i = 0; i < users.length; i++) {
                    if (users[i].username === username && users[i].password === password) {
                        isValidUser = true;
                        break;
                    }
                }

                if (isValidUser) {
                    alert("Login berhasil!");
                    window.location.href = "index.html";
                } else {
                    alert("Username atau password salah. Silakan coba lagi.");
                }
            });
        });
    </script>
    <script src="assets/js/vendor.min.js"></script>
    <script src="assets/js/app.min.js"></script>
</body>

</html>
