<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <title>Tiktok Downloaders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Download Videos of Tiktok no watermark. Free and Easy!!">
    <meta name="author" content="Skizo||Team">
    <link href="assets/css/vendor.min.css" rel="stylesheet">
    <link href="assets/css/app.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha384-GLhlTQ8iN17Sme8k0I68HgB6PIfA/DJ4P5ZCDG1g5Fq2xGoC5CS5M" crossorigin="anonymous">
    <link rel="shortcut icon" href="https://telegra.ph/file/f90fa948e64f8d9499bd0.jpg" type="image/x-icon">
    <style>
        .chat-container {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #f0f0f000;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            position: relative;
            background-color: #075e5400;
            color: #fff;
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
        }

        /* Tambahkan CSS ini di dalam tag <style> */
        .chat-header a {
            text-decoration: none;
            display: flex;
            align-items: center;
            color: #fff;
            transition: color 0.3s ease-in-out;
        }

        .chat-header img {
            border-radius: 50%;
            margin-right: 10px;
            transition: transform 0.3s ease-in-out;
        }

        .chat-header a:hover img {
            transform: scale(1.1);
        }

        .chat-header-text {
            font-weight: bold;
        }

        .status {
            margin-left: 5px;
            width: 10px;
            height: 10px;
            background-color: #25D366;
            border-radius: 50%;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            /* Tambahkan margin bottom untuk memberi ruang antara chat box dan input */
        }

        .message {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.4;
            max-width: 70%;
        }

        .received {
            background-color: #f2f3f500;
            align-self: flex-start;
        }

        .sent {
            background-color: #dcf8c600;
            align-self: flex-end;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
        }

        #userInput {
            margin-right: 10px;
            /* Tambahkan margin right pada input */
            margin-bottom: 10px;
            /* Tambahkan margin bottom pada input */
        }

        #sendButton {
            margin-bottom: 10px;
            /* Tambahkan margin bottom pada button */
        }
    </style>
</head>

<body class="pace-top">
    <div class="chat-container">
        <div class="card-header fw-bold small chat-header">
            <a href="./dashboard">
                <img src="https://telegra.ph/file/f90fa948e64f8d9499bd0.jpg" alt="WhatsApp Icon" width="40" height="40">
                <div class="chat-header-text">YanBot</div>
            </a>
            <div class="status"></div>
        </div>
        <div id="chatBox" class="chat-box">
            <div class="message received">
                <div class="message received">Hallo!!, Saya YanBot. Ada Yang Bisa Saya Bantu?</div>
            </div>
        </div>
        <div class="card-footer fw-bold small chat-header">
            <input type="text" name="text" id="userInput" class="form-control form-control-lg bg-inverse bg-opacity-5"
                value="" placeholder="Ketik pesan Anda di sini...">
            <button type="button" id="sendButton"
                class="btn btn-outline-theme btn-lg d-block fas fa-paper-plane"></button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        sendButton.addEventListener('click', sendMessage);

        async function sendMessage() {
            const userMessage = userInput.value;
            if (userMessage.trim() !== '') {
                appendMessage(userMessage, 'sent');
                userInput.value = '';
                // Panggil fungsi untuk mendapatkan balasan dari Chatbot
                await getChatbotResponse(userMessage);
            }
        }

        async function getChatbotResponse(userMessage) {
            const response = await fetch("https://skizo.tech/api/bard-ai?apikey=dagul&text=" + userMessage);
            const responseData = await response.json();
            const chatbotReply = responseData.content;
            appendMessage(chatbotReply, 'received');
        }

        function appendMessage(message, type) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', type);
            messageElement.innerText = message;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
    <script src="assets/js/vendor.min.js"></script>
    <script src="assets/js/app.min.js"></script>
</body>

</html>
